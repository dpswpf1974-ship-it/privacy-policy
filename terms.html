  <h1>서비스 이용약관</h1>
  <p>이 페이지는 앱 사용을 위한 기본 약관을 안내합니다.</p>

  <p>본 약관은 사용자가 앱을 이용할 때 지켜야 할 규칙을 설명합니다.</p>
  <h2>2. 사용자 의무</h2>
  <p>사용자는 앱을 법과 규정에 맞게 사용해야 합니다.</p>
  <h2>3. 책임 제한</h2>
  <p>앱 제공자는 서비스 이용 중 발생하는 문제에 대해 일부 책임을 제한할 수 있습니다.</p>
